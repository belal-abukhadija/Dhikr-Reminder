<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhikr Reminder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <div class="popup-header">
    <h2 style="margin-bottom: 5px;">Dhikr Reminder</h2>
    <p style="color: var(--text-muted); font-size: 13px;">Keep your tongue moist with the remembrance of Allah.</p>
  </div>

  <div class="status-card">
    <div class="status-info">
      <div id="statusLabel" class="status-text">Status: Active</div>
      <div id="intervalLabel" style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Every 5 mins</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>

  <button id="optionsBtn" class="btn btn-primary" style="width: 100%;">
    Settings & Customization
  </button>

  <script src="popup.js"></script>
</body>
</html>
